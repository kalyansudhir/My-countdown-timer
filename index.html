<!DOCTYPE html>
<html>
<head>
    <title>My Countdown Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎉 My Awesome Countdown 🎉</h1>
        
        <div class="timer-box">
            <div class="time-unit">
                <span id="days">00</span>
                <label>Days</label>
            </div>
            <div class="time-unit">
                <span id="hours">00</span>
                <label>Hours</label>
            </div>
            <div class="time-unit">
                <span id="minutes">00</span>
                <label>Minutes</label>
            </div>
            <div class="time-unit">
                <span id="seconds">00</span>
                <label>Seconds</label>
            </div>
        </div>
        
        <p class="event-name">Until My Birthday! 🎂</p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
